name: Update L2 data into JSON files

on:
  workflow_dispatch:
  schedule:
    # 02:15 UTC
    # GitHub Actions might be delayed if time is at exact hour
    - cron: '0 0 * * *'

jobs:
  updateL2Data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2


      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
          
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build:dependencies


      - name: Fetch and save L2s data
        run:  cd packages/config && pnpm install && pnpm layer2-details


      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v3
        with:
          delete-branch: true
          author: Data parser bot <bot-12345@protonmail.com>
          commit-message: "chore[layer2]: Update data"
          title: "chore[layer2]: Update data"
          body: |
            - Update layer2 data
            Auto-generated by [create-pull-request][1]
            [1]: https://github.com/peter-evans/create-pull-request
          labels: automerge
          branch: update-layer2-parsed-data